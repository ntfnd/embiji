decisions:
  - MVVM Architecture: Separated Model (services), ViewModel (orchestrators), View (entry points) for clear separation of concerns
  - Vite + Vitest: Chosen for fast build and modern testing with ES modules
  - Class-based: All services and ViewModels use classes for testability and dependency injection
  - Single if pattern: No nested if, no else if, no ternary - only simple if with early return
  - Comment prefixes: MODEL, VIEWMODEL, VIEW, UTIL, NOTE, TODO, IMPORTANT for consistency

findings:
  - All 105 tests passing with Vitest + jsdom
  - Build produces dist/ folder with all necessary files
  - Extension maintains original functionality (modal/paywall removal)
  - Code is more maintainable with MVVM pattern

worked:
  - Filter + forEach instead of if inside forEach for cleaner code
  - Early return pattern with simple if statements
  - Dependency injection in ViewModels for testability
  - Single if for each condition instead of else if

failed:
  - Complex short-circuit conditions like `condition && (expr1, expr2)` - replaced with simple if
  - IIFE returns like `condition && (() => { return; })()` - replaced with simple if + return
  - Ternary operators - replaced with simple if statements

