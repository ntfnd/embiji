decisions:
  - Per-node cache: Use WeakMap<Text, timestamp> instead of global timer to allow new content to be processed immediately
  - IIFE format: Content scripts must be IIFE (not ES modules) for Chrome Manifest V3 compatibility
  - Inline + Popover: Show inline conversion for quick reference, keep popover for detailed breakdown

findings:
  - Vite IIFE format with multiple entries requires separate build configs
  - Custom build.js script handles content/popup/background separately as IIFE
  - WeakMap allows per-node timestamp tracking without memory leaks

worked:
  - build.js: Separate IIFE builds for each entry point
  - WeakMap<Text, number>: Track when each node was processed
  - TreeWalker acceptNode: Check individual node timestamps

failed:
  - Single vite config with IIFE format + multiple inputs: "inlineDynamicImports: true" not supported with multiple inputs
  - WeakSet: Cannot store timestamps, switched to WeakMap

