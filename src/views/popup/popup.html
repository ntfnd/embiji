<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBG Price Converter</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }

    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .status.enabled {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      color: #667eea;
      border: 1px solid #667eea;
    }

    .status.disabled {
      background-color: #f8d7da;
      color: #721c24;
    }

    .info {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .conversion-info {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .conversion-info strong {
      color: #667eea;
    }

    .settings-section {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .settings-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .setting-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-row input[type="checkbox"] {
      margin-top: 2px;
      cursor: pointer;
    }

    .setting-row label {
      font-size: 12px;
      color: #555;
      line-height: 1.4;
      cursor: pointer;
      flex: 1;
    }

    button {
      width: 100%;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1 id="title">MBG Price Converter</h1>
  <div class="subtitle">Makan Bergizi Gratis</div>
  <div id="status" class="status enabled">Enabled</div>
  <div class="conversion-info">
    <strong>Konversi:</strong> 1,2 Triliun = 1 Hari MBG
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Pengaturan</div>
    <div class="setting-row">
      <input type="checkbox" id="rpOnlyCheckbox">
      <label for="rpOnlyCheckbox">Hanya deteksi nominal dengan prefix "Rp"</label>
    </div>
  </div>

  <div id="info" class="info">Version: <span id="version">1.0.0</span></div>
  <button id="toggleButton">Disable</button>
  <script type="module" src="./popup.js"></script>
</body>
</html>
